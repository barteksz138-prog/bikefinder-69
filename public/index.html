<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DirtDealFinder 🚲</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080d18; color: #e2e8f0; font-family: 'Inter', 'Segoe UI', sans-serif; font-size: 14px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0d1526; }
    ::-webkit-scrollbar-thumb { background: #2d3f5c; border-radius: 3px; }
    input, select, textarea {
      background: #111c2e !important; color: #e2e8f0 !important;
      border: 1px solid #1e3352 !important; border-radius: 8px !important;
      padding: 9px 12px !important; outline: none !important; width: 100%;
      font-family: inherit; font-size: 13px;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #f59e0b !important;
      box-shadow: 0 0 0 2px #f59e0b18 !important;
    }
    input::placeholder, textarea::placeholder { color: #334155 !important; }
    button { cursor: pointer; font-family: inherit; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// Typy wpisów:
//   isCategory: true  → categoryUrl to pełny URL Kleinanzeigen z filtrem kategorii
//   (brak)            → query to fraza wyszukiwana w /s-fahrraeder/{query}/k0c217
const BIKE_MODELS = [
  {
    id: "cat_mountainbike",
    label: "🏔️ Mountain Bike",
    isCategory: true,
    categoryUrl: "https://www.kleinanzeigen.de/s-fahrraeder/preis:200:2000/c217+fahrraeder.type_s:mountainbike",
  },
];

// Etykiety typu roweru zwracanego przez Gemini
const TYPE_LABELS = {
  full: { label: "🟢 Full",  color: "#22c55e" },
  dirt: { label: "🟠 Dirt",  color: "#f59e0b" },
  elektryk_gorski: { label: "⚡ Elektryk górski", color: "#38bdf8" },
  inny: { label: "⚫ Inny",  color: "#475569" },
};

const PROVIDERS = {
  gemini: {
    label: "Google Gemini",
    models: [
      { id: "gemini-2.5-flash",      label: "Gemini 2.5 Flash (zalecany)" },
      { id: "gemini-2.5-flash-lite", label: "Gemini 2.5 Flash-Lite (najtańszy, domyślnie bez myślenia)" },
      { id: "gemini-flash-latest",   label: "Gemini 3.5 Flash (najnowszy, droższy)" },
      { id: "gemini-2.5-pro",        label: "Gemini 2.5 Pro" },
    ],
    keyPlaceholder: "AIza...",
    keyHint: "aistudio.google.com/apikey",
  },
  groq: {
    label: "Groq (darmowy, bez karty)",
    models: [
      { id: "llama-3.3-70b-versatile",  label: "Llama 3.3 70B (zalecany)" },
      { id: "llama-3.1-8b-instant",     label: "Llama 3.1 8B (szybki)" },
      { id: "mixtral-8x7b-32768",       label: "Mixtral 8x7B" },
    ],
    keyPlaceholder: "gsk_...",
    keyHint: "console.groq.com/keys",
  },
};

const SC = {
  analyzing: { bg: "#8b5cf622", color: "#a78bfa", border: "#8b5cf655", label: "AI analizuje…" },
  deal:      { bg: "#22c55e22", color: "#22c55e", border: "#22c55e55", label: "✅ Okazja!" },
  skip:      { bg: "#1e293b",   color: "#475569", border: "#1e293b",   label: "⏭ Pominięte" },
  sent:      { bg: "#3b82f622", color: "#60a5fa", border: "#3b82f655", label: "📨 Wysłano" },
  error:     { bg: "#ef444422", color: "#f87171", border: "#ef444455", label: "⚠️ Błąd" },
};

function Badge({ status }) {
  const s = SC[status] || SC.skip;
  return (
    <span style={{ background: s.bg, color: s.color, border: `1px solid ${s.border}`,
      borderRadius: 6, padding: "2px 10px", fontSize: 11, fontWeight: 700, letterSpacing: 0.4 }}>
      {s.label}
    </span>
  );
}

function App() {
  const [tab, setTab] = useState("scanner");

  const [cfg] = useState(() => {
    try { return JSON.parse(localStorage.getItem("ddf_cfg") || "{}"); } catch { return {}; }
  });
  const [geminiKey,      setGeminiKey]      = useState(cfg.geminiKey || "");
  const [provider,       setProvider]       = useState(cfg.provider || "groq");
  const [geminiModel,    setGeminiModel]    = useState(cfg.geminiModel || "llama-3.3-70b-versatile");
  const [geminiChatName, setGeminiChatName] = useState(cfg.geminiChatName || "");
  const [minProfit,      setMinProfit]      = useState(cfg.minProfit || 20);
  // Klucz Groq używany WYŁĄCZNIE do szybkiej, lekkiej klasyfikacji typu roweru (etap 1) — niezależnie od
  // tego jaki provider jest wybrany do właściwej analizy opłacalności (etap 2, zwykle Gemini).
  const [groqClassifierKey, setGroqClassifierKey] = useState(cfg.groqClassifierKey || "");
  // Ile rowerów maksymalnie wysyłamy do Gemini (etap 2, drogi/limitowany) w ramach JEDNEGO cyklu skanowania.
  const [maxGeminiPerCycle, setMaxGeminiPerCycle] = useState(cfg.maxGeminiPerCycle ?? 25);
  // Ogłoszenia sklasyfikowane przez Groq jako "niepewne" (z ceną) idą do Gemini TYLKO jeśli cena >= ten próg.
  // Cel: przy niepewnym typie i niskiej cenie prawdopodobieństwo że to coś wartego uwagi jest niskie —
  // nie warto marnować wywołania Gemini. Ogłoszenia bez podanej ceny ZAWSZE trafiają do listy niepewnych
  // (nie przechodzą przez ten próg, bo nie ma z czym porównać).
  const [minUncertainPrice, setMinUncertainPrice] = useState(cfg.minUncertainPrice ?? 500);
  const [priceKnowledge, setPriceKnowledge] = useState(() => {
    try { return JSON.parse(localStorage.getItem("ddf_price_knowledge") || "[]"); } catch { return []; }
  });
  const [discordWebhook, setDiscordWebhook] = useState(cfg.discordWebhook || "");
  const [discordThread,  setDiscordThread]  = useState(cfg.discordThread || "");
  const [uncertainWebhook, setUncertainWebhook] = useState(cfg.uncertainWebhook || "");
  // UWAGA: "E-Bike"/"Ebike"/"Pedelec"/"Elektrofahrrad" CELOWO NIE są tu wpisane — o tym czy elektryk jest
  // górski (elektryk_gorski, chcemy) czy miejski/touringowy (inny, nie chcemy) decyduje Groq w Etapie 1
  // na podstawie kontekstu. Blankietowe blokowanie tych słów odrzucałoby też wartościowe e-MTB.
  const DEFAULT_FILTER_KEYWORDS = "Rennrad, Gravel, Trekkingrad, Hollandrad, Cityrad, Stadtrad, Kinderfahrrad, Laufrad, Klapprad, Liegerad, Dreirad, Rollator, Ersatzteile, Einzelteile, nur Rahmen, Rahmen only, Rahmenset, Bastlerrad, Schrott, gesucht, Kinder, Jugend, 12 Zoll, 16 Zoll, 20 Zoll, 24 Zoll, Damenrad, Herrenrad, Tourenrad, Reiserad, Crossrad, Fitnessbike, Singlespeed, Fixie, BMX Freestyle, Faltrad, Lastenrad, Cargobike, Seniorenrad, Elektroroller, E-Scooter, Escooter, Motorroller, Tretroller, Kickscooter, Balance Bike, Laufrädchen, Fahrradanhänger, Kinderanhänger, Kinderwagen, Fahrradträger, Rollstuhl, Vermietung, Verleih, Miete, Tausch gegen, Deko, Bastelobjekt, Spielzeugrad, Puky, Kettcar, Dreiradwagen";
  const [filterKeywords, setFilterKeywords] = useState(cfg.filterKeywords ?? DEFAULT_FILTER_KEYWORDS);
  const [selectedBikes,  setSelectedBikes]  = useState(() => {
    const saved = cfg.selectedBikes;
    if (!saved) return BIKE_MODELS.map(b => b.id);
    // Migracja: stary id mtb_full_category -> nowy cat_mountainbike
    const migrated = saved.map(id => id === 'mtb_full_category' ? 'cat_mountainbike' : id);
    // Dodaj nowe kategorie jeśli ich nie ma
    ['cat_mountainbike','cat_dirt_bmx','cat_downhill'].forEach(id => {
      if (!migrated.includes(id)) migrated.push(id);
    });
    return migrated.filter(id => BIKE_MODELS.some(b => b.id === id));
  });

  const [logs,     setLogs]     = useState([]);
  const [results,  setResults]  = useState([]);
  const [running,  setRunning]  = useState(false);
  const [stats,    setStats]    = useState({ scanned: 0, deals: 0, sent: 0 });
  const [cycleNum, setCycleNum] = useState(0);

  // ── Chat state ─────────────────────────────────────────────────────────
  const [chatMessages, setChatMessages] = useState(() => {
    try { return JSON.parse(localStorage.getItem("ddf_chat") || "[]"); } catch { return []; }
  });
  const [chatInput, setChatInput]   = useState("");
  const [chatLoading, setChatLoading] = useState(false);
  const [showKnowledgePanel, setShowKnowledgePanel] = useState(false);
  const chatEndRef = useRef(null);

  useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [chatMessages]);

  const saveChatHistory = (msgs) => {
    try { localStorage.setItem("ddf_chat", JSON.stringify(msgs.slice(-200))); } catch {}
  };

  const savePriceKnowledge = (entries) => {
    try { localStorage.setItem("ddf_price_knowledge", JSON.stringify(entries)); } catch {}
    setPriceKnowledge(entries);
  };

  const addKnowledgeFromMessage = (content) => {
    const entry = { id: Date.now() + Math.random(), text: content.trim(), addedAt: new Date().toLocaleString("pl-PL") };
    savePriceKnowledge([...priceKnowledge, entry]);
  };

  const removeKnowledgeEntry = (id) => {
    savePriceKnowledge(priceKnowledge.filter(e => e.id !== id));
  };

  const runningRef   = useRef(false);
  const firstCycleRef = useRef(true); // cykl #1 = tylko zbieramy ID, nie analizujemy
  const geminiCallsRef = useRef(0); // licznik analiz Gemini w BIEŻĄCYM cyklu — reset na starcie każdego cyklu
  const logsEndRef  = useRef(null);

  // Zapamiętaj widziane ID między restartami
  const loadSeenIds = () => {
    try { return new Set(JSON.parse(localStorage.getItem("ddf_seen") || "[]")); } catch { return new Set(); }
  };
  const seenIdsRef = useRef(loadSeenIds());
  const saveSeenId = (id) => {
    seenIdsRef.current.add(id);
    try {
      const arr = [...seenIdsRef.current].slice(-2000); // max 2000 ID
      localStorage.setItem("ddf_seen", JSON.stringify(arr));
    } catch {}
  };

  useEffect(() => { logsEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [logs]);

  const saveSettings = () => {
    const data = { geminiKey, geminiModel, geminiChatName, discordWebhook, discordThread, uncertainWebhook, filterKeywords, groqClassifierKey, maxGeminiPerCycle, minUncertainPrice, selectedBikes, provider, minProfit };
    localStorage.setItem("ddf_cfg", JSON.stringify(data));
    addLog("💾 Ustawienia zapisane", "success");
  };

  const addLog = useCallback((msg, type = "info") => {
    setLogs(prev => [...prev.slice(-499), {
      time: new Date().toLocaleTimeString("pl-PL"), msg, type,
    }]);
  }, []);

  // ── Proxy API calls ────────────────────────────────────────────────────
  const callProxy = async (body) => {
    const resp = await fetch("/api/gemini", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const ct = resp.headers.get("content-type") || "";
    if (!ct.includes("application/json")) {
      throw new Error(`Proxy zwróciło HTML zamiast JSON (HTTP ${resp.status}) — sprawdź czy plik api/gemini.js jest wgrany na serwer`);
    }
    return resp.json();
  };

  // Wywołanie AI — obsługuje Gemini i Groq przez backend proxy /api/gemini
  const callGemini = async (prompt) => {
    const data = await callProxy({
      provider,
      model: geminiModel,
      apiKey: geminiKey,
      messages: provider === "groq"
        ? [{ role: "user", content: prompt }]
        : [{ role: "user", parts: [{ text: prompt }] }],
      generationConfig: provider === "groq"
        ? { temperature: 0.3, maxOutputTokens: 200 }
        : { temperature: 0.3, maxOutputTokens: 200, responseMimeType: "application/json" },
    });
    if (data?.error) throw new Error(data.error?.message || JSON.stringify(data.error));
    if (provider === "groq") {
      const text = data?.choices?.[0]?.message?.content || "";
      return { candidates: [{ content: { parts: [{ text }] }, finishReason: "STOP" }] };
    }
    return data;
  };

  const sendChatMessage = async () => {
    if (!chatInput.trim() || chatLoading) return;
    if (!geminiKey) { alert("Wpisz klucz API w Ustawieniach, żeby korzystać z chatu."); return; }
    const userMsg = { role: "user", content: chatInput.trim(), time: new Date().toLocaleTimeString("pl-PL") };
    const newMsgs = [...chatMessages, userMsg];
    setChatMessages(newMsgs);
    setChatInput("");
    setChatLoading(true);

    try {
      let responseText = "";

      const knowledgeBlock = priceKnowledge.length > 0
        ? `Oto Twoja baza wiedzy o cenach rowerów, zbudowana z realnych transakcji i notatek użytkownika. Korzystaj z niej zawsze gdy oceniasz wartość roweru lub odpowiadasz na pytania o ceny:\n\n${priceKnowledge.map((e, i) => `${i + 1}. ${e.text}`).join("\n")}\n\n---\n\n`
        : "";

      const historyForApi = [...newMsgs];
      if (knowledgeBlock) {
        // Wstrzyknij bazę wiedzy jako kontekst do pierwszej wiadomości w wysyłce (nie zapisujemy tego w widocznej historii)
        historyForApi[0] = { ...historyForApi[0], content: knowledgeBlock + historyForApi[0].content };
      }

      const messages = provider === "groq"
        ? historyForApi.map(m => ({ role: m.role === "assistant" ? "assistant" : "user", content: m.content }))
        : historyForApi.map(m => ({ role: m.role === "assistant" ? "model" : "user", parts: [{ text: m.content }] }));

      const data = await callProxy({
        provider,
        model: geminiModel,
        apiKey: geminiKey,
        messages,
        generationConfig: { temperature: 0.7, maxOutputTokens: 8192 },
      });
      if (data?.error) throw new Error(data.error?.message || JSON.stringify(data.error));
      if (provider === "groq") {
        responseText = data?.choices?.[0]?.message?.content || "(brak odpowiedzi)";
      } else {
        responseText = data?.candidates?.[0]?.content?.parts?.[0]?.text || "(brak odpowiedzi)";
      }
      const aiMsg = { role: "assistant", content: responseText, time: new Date().toLocaleTimeString("pl-PL") };
      const finalMsgs = [...newMsgs, aiMsg];
      setChatMessages(finalMsgs);
      saveChatHistory(finalMsgs);
    } catch (e) {
      const errMsg = { role: "assistant", content: `⚠️ Błąd: ${e.message}`, time: new Date().toLocaleTimeString("pl-PL"), isError: true };
      const finalMsgs = [...newMsgs, errMsg];
      setChatMessages(finalMsgs);
      saveChatHistory(finalMsgs);
    } finally {
      setChatLoading(false);
    }
  };

  const callDiscord = async (payload) => {
    const resp = await fetch("/api/discord", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ webhookUrl: discordWebhook, threadId: discordThread, payload }),
    });
    return resp.json();
  };

  const callUncertainDiscord = async (payload) => {
    if (!uncertainWebhook) return { ok: false };
    const resp = await fetch("/api/discord", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ webhookUrl: uncertainWebhook, threadId: "", payload }),
    });
    return resp.json();
  };

  // Filtr słów kluczowych — odrzuca ogłoszenie ZANIM trafi do Gemini (zero kosztu)
  const getFilterKeywordList = () =>
    filterKeywords.split(/[,\n]/).map(s => s.trim().toLowerCase()).filter(Boolean);

  const matchesFilterKeyword = (listing) => {
    const haystack = `${listing.title} ${listing.desc}`.toLowerCase();
    const keywords = getFilterKeywordList();
    for (const kw of keywords) {
      if (kw && haystack.includes(kw)) return kw;
    }
    return null;
  };

  // Biała lista — zwraca true jeśli ogłoszenie zawiera CHOĆ JEDNO wymagane słowo (sygnał full/dirt).
  // Jeśli lista jest pusta, filtr jest wyłączony (przepuszcza wszystko, jak dotychczas).
  const GROQ_CLASSIFIER_MODEL = "llama-3.1-8b-instant"; // lekki, szybki, hojny darmowy limit (14 400 zapytań/dzień)

  // ── Etap 1: szybka, "głupia" klasyfikacja typu roweru przez Groq ──────────
  // Cel: odrzucić ewidentnie nietrafione typy (szosówki, miejskie, dziecięce, części...) BEZ
  // wysyłania ich do drogiej/limitowanej analizy Gemini. Lekki prompt = minimalne zużycie
  // tokenów na zapytanie, więc nie zapycha limitu TPM Groqa tak jak zrobiłby to pełny prompt z cennikiem.
  // Gdy Groq nie jest pewien typu (lub wystąpi błąd/limit) — NIE odrzucamy, tylko oznaczamy jako
  // "niepewne" i przepuszczamy dalej z niższym priorytetem (patrz Faza 2 w runOneCycle).
  const classifyWithGroq = async (listing) => {
    if (!groqClassifierKey) return "niepewne"; // brak klucza = filtr wyłączony, przepuść wszystko

    const prompt = `Klasyfikator ogłoszeń rowerowych. Na podstawie tytułu i opisu określ TYLKO typ roweru.

Typy:
- full — PEŁNE zawieszenie (amortyzator z tyłu + widelec z przodu): enduro/trail/all-mountain/downhill.
- dirt — dirt jump/slopestyle/pumptrack, sztywny hardtail do skoków.
- elektryk_gorski — elektryczny rower górski/e-MTB (napęd + charakter trail/enduro). NIE miejski e-bike.
- inny — reszta: szosówka, gravel, trekking, miejski, dziecięcy, hardtail XC bez cech dirtowych, części, miejski e-bike.

ZASADA: samo słowo "Mountainbike"/"MTB" w tytule BEZ dowodu na pełne zawieszenie = zwykle TANI HARDTAIL, czyli "inny", NIE "full"! Klasyfikuj jako "full" TYLKO gdy jest konkretny dowód: "vollgefedert"/"Fully"/"full suspension", wzmianka o amortyzatorze/zawieszeniu z tyłu ("Dämpfer", "Federung hinten", "Hinterbau"), lub znany model full: Canyon Torque/Spectral/Strive/Neuron/Nerve, Trek Fuel/Slash/Remedy, Specialized Stumpjumper/Enduro/Camber, Cube Stereo/AMS, Santa Cruz, YT, Commencal, Radon Swoop/Slide, Ghost Riot/SL AMR, Focus Jam/Sam/Thron.

ZNANE HARDTAILE (= "inny", nie "full"): Trek Marlin/Roscoe/X-Caliber, Cube Aim/Access/Acid/Analog/Attention/Reaction, BULLS Sharptail/Copperhead/Wildtail/Six50, Rockrider/Rockride (Decathlon, wszystkie ST-serie), Specialized Rockhopper/Pitch/Chisel/Hardrock, Scott Aspect/Scale, Merida Big Nine/Seven/Trail, Ghost Kato/Lanao, Giant Talon/ATX, KTM Chicago/Ultra, Focus Whistler/Raven.

E-BIKE: sygnały napędu ("E-Bike","Akku","Motor",Bosch/Shimano Steps/Brose/Yamaha, przebieg w km, "E1.5"/"E-8"). Z charakterem górskim (zawieszenie/MTB/teren) → elektryk_gorski. Z charakterem miejskim/touring (koszyk, błotniki, "City"/"Trekking") → inny.

Brak wystarczających informacji → odpowiedz: niepewne

Tytuł: ${listing.title}
Opis: ${listing.desc}

Odpowiedz WYŁĄCZNIE jednym słowem (full/dirt/elektryk_gorski/inny/niepewne), bez innego tekstu.`;

    addLog(`🔎 Groq: klasyfikuję — ${listing.title}${listing.price != null ? ` (${listing.price}€)` : ""}`, "info");

    // Retry z backoffem — Groq (free tier: 30 RPM) czasem rzuca 429 przy chwilowym skoku ruchu.
    // Zamiast od razu poddawać się i lecieć dalej jako "niepewne", próbujemy ponownie 2 razy,
    // czekając tyle ile Groq każe w komunikacie błędu ("try again in Xms/Xs").
    for (let attempt = 1; attempt <= 3; attempt++) {
      const startedAt = Date.now();
      try {
        const data = await callProxy({
          provider: "groq",
          model: GROQ_CLASSIFIER_MODEL,
          apiKey: groqClassifierKey,
          messages: [{ role: "user", content: prompt }],
          generationConfig: { temperature: 0.1, maxOutputTokens: 20 },
        });
        const ms = Date.now() - startedAt;

        if (data?.error) {
          const msg = data.error?.message || "błąd";
          const isRateLimit = /rate limit|429|too many requests/i.test(msg);
          if (isRateLimit && attempt < 3) {
            const m = msg.match(/try again in ([\d.]+)(ms|s)/i);
            const waitMs = m ? (m[2].toLowerCase() === "ms" ? parseFloat(m[1]) : parseFloat(m[1]) * 1000) : 3000;
            addLog(`⏳ Groq: limit RPM osiągnięty — czekam ${Math.ceil((waitMs + 300) / 1000)}s, próba ${attempt + 1}/3 — ${listing.title}`, "error");
            await sleep(waitMs + 300);
            continue; // ponów
          }
          addLog(`⚠️ Groq klasyfikator: ${msg} (${ms}ms) — przepuszczam dalej jako niepewne`, "error");
          return "niepewne";
        }

        const raw = (data?.choices?.[0]?.message?.content || "").toLowerCase().trim();
        let typ;
        if (raw.includes("elektryk")) typ = "elektryk_gorski";
        else if (raw.includes("dirt")) typ = "dirt";
        else if (raw.includes("full")) typ = "full";
        else if (raw.includes("inny")) typ = "inny";
        else typ = "niepewne";

        const icon = { full: "🟢", dirt: "🟠", elektryk_gorski: "⚡", inny: "⚫", niepewne: "❓" }[typ];
        const rawNote = !["full", "dirt", "elektryk_gorski", "inny", "niepewne"].includes(raw) && raw && typ === "niepewne"
          ? ` (Groq odpowiedział niejednoznacznie: "${raw.slice(0, 40)}")`
          : "";
        addLog(`${icon} Groq (${ms}ms): typ="${typ}"${rawNote} — ${listing.title}`, "info");
        return typ;
      } catch (e) {
        const ms = Date.now() - startedAt;
        if (attempt < 3) {
          addLog(`⏳ Groq: błąd sieci (${e.message}, ${ms}ms) — ponawiam za 2s, próba ${attempt + 1}/3 — ${listing.title}`, "error");
          await sleep(2000);
          continue;
        }

        }

        if (typ === "niepewne") phase1Stats.uncertain++; else phase1Stats.confident++;
        geminiCandidates.push({ listing, groqType: typ });
      }

      await sleep(3000);
    }

    if (firstCycleRef.current) {
      firstCycleRef.current = false;
      addLog(`✔ Cykl #${cycleN} zakończony — czekam 60s przed kolejnym`, "info");
      return;
    }

    addLog(
      `📊 Podsumowanie etapu 1: 🚫 ${phase1Stats.blacklist} odrzuconych (czarna lista) · 🚫 ${phase1Stats.groqInny} odrzuconych (Groq: inny) · 🚫 ${phase1Stats.priceThreshold} odrzuconych (niepewne + cena < ${minUncertainPrice}€) · ❓ ${phase1Stats.noPrice} bez ceny → niepewne · ➡️ ${geminiCandidates.length} kandydatów do Gemini (${phase1Stats.confident} pewnych, ${phase1Stats.uncertain} niepewnych)`,
      "success"
    );

    // ── FAZA 2 — Gemini: tylko jeśli jest jeszcze limit na ten cykl, pewne typy najpierw ──
    // Sortowanie stabilne: kandydaci z pewną klasyfikacją (full/dirt/elektryk_gorski) idą PRZED
    // "niepewnymi" — jeśli limit się skończy, to "niepewne" odpadają jako pierwsze.
    const sorted = [...geminiCandidates].sort((a, b) =>
      (b.groqType !== "niepewne" ? 1 : 0) - (a.groqType !== "niepewne" ? 1 : 0));
    if (sorted.length > maxGeminiPerCycle) {
      addLog(`⚖️ ${sorted.length} kandydatów do Gemini, limit cyklu = ${maxGeminiPerCycle} — część zostanie pominięta (priorytet: pewne typy)`, "info");
    }

    for (const { listing, groqType } of sorted) {
      if (!runningRef.current) return;

      if (geminiCallsRef.current >= maxGeminiPerCycle) {
        addLog(`⏭ Pominięte — limit ${maxGeminiPerCycle} analiz Gemini na cykl osiągnięty: ${listing.title}`, "info");
        setResults(prev => [{
          id: Date.now() + Math.random(), listing,
          analysis: { typ_roweru: "?", decyzja: "niepewne", oplaca_sie: false, krotki_opis: `Pominięte — limit ${maxGeminiPerCycle} analiz Gemini na ten cykl osiągnięty` },
          status: "skip",
          timestamp: new Date().toLocaleTimeString("pl-PL"),
        }, ...prev].slice(0, 400));
        continue;
      }

      geminiCallsRef.current += 1;
      const analysis = await analyzeWithGemini(listing, groqType);
      let status = "skip";

      if (!analysis) {
        status = "error";
      } else if (analysis.decyzja === "tak") {
        // ✅ Gemini mówi TAK → wysyłaj webhook
        addLog(`✅ OKAZJA! [${analysis.typ_roweru}] ${listing.title} | zakup: ${analysis.cena_zakupu_eur ?? "?"}€ → sprzedaż PL: ${analysis.szacowana_sprzedaz_eur ?? "?"}€ | zysk: ~${analysis.przewidywany_zysk}€`, "success");
        setStats(s => ({ ...s, deals: s.deals + 1 }));
        const sent = await sendToDiscord(listing, analysis);
        status = sent ? "sent" : "deal";
        if (sent) {
          setStats(s => ({ ...s, sent: s.sent + 1 }));
          addLog(`📨 Wysłano na Discord: ${listing.href}`, "success");
        } else {
          addLog(`⚠️ Nie udało się wysłać na Discord`, "error");
        }
      } else if (analysis.decyzja === "niepewne") {
        // ❓ Za mało danych żeby ocenić — zbierz do zbiorczej wiadomości
        addLog(`❓ Niepewne [${analysis.typ_roweru}] — ${listing.title} | zakup: ${analysis.cena_zakupu_eur ?? "?"}€ — ${analysis.krotki_opis || "za mało informacji"}`, "info");
        uncertainBatch.push({ listing, reason: analysis.krotki_opis || "za mało informacji" });
      } else {
        // ❌ Gemini mówi NIE → nie wysyłaj
        const reason = analysis.typ_roweru === "inny"
          ? `typ: inny — odrzucone automatycznie`
          : `zysk za mały`;
        addLog(`⏭ Gemini: NIE opłaca się (${reason}) — [${analysis.typ_roweru}] ${listing.title} | zakup: ${analysis.cena_zakupu_eur ?? "?"}€ → sprzedaż PL: ${analysis.szacowana_sprzedaz_eur ?? "?"}€`, "info");
      }

      setResults(prev => [{
        id: Date.now() + Math.random(), listing, analysis, status,
        timestamp: new Date().toLocaleTimeString("pl-PL"),
      }, ...prev].slice(0, 400));

      await sleep(5000);
    }

    // ── Wyślij zbiorczą listę "niepewnych" na koniec cyklu (jeśli są i webhook ustawiony) ──
    if (uncertainBatch.length > 0 && uncertainWebhook) {
      const lines = uncertainBatch.map(u => `🔸 ${u.listing.title}${u.listing.price != null ? ` (${u.listing.price}€)` : ""} — ${u.reason}\n${u.listing.href}`).join("\n\n");
      const content = `❓ **Niepewne rowery — cykl #${cycleN}** (${uncertainBatch.length})\n\n${lines}`.slice(0, 1900);
      try {
        await callUncertainDiscord({ content });
        addLog(`📨 Wysłano listę ${uncertainBatch.length} niepewnych na Discord`, "success");
      } catch (e) {
        addLog(`⚠️ Błąd wysyłki listy niepewnych: ${e.message}`, "error");
      }
    } else if (uncertainBatch.length > 0 && !uncertainWebhook) {
      addLog(`❓ ${uncertainBatch.length} niepewnych rowerów (brak webhooka — ustaw w Ustawieniach żeby dostawać listę)`, "info");
    }

    firstCycleRef.current = false;
    addLog(`✔ Cykl #${cycleN} zakończony — czekam 60s przed kolejnym`, "info");
  }, [geminiKey, geminiModel, geminiChatName, discordWebhook, discordThread, uncertainWebhook, filterKeywords, groqClassifierKey, maxGeminiPerCycle, minUncertainPrice, selectedBikes, priceKnowledge, minProfit]);

  // ── Continuous loop ────────────────────────────────────────────────────
  const startLoop = async () => {
    if (!geminiKey)      { addLog("❌ Brak klucza API (Groq/Gemini)", "error"); setTab("settings"); return; }
    if (!discordWebhook) { addLog("❌ Brak Discord Webhook",    "error"); setTab("settings"); return; }

    runningRef.current = true;
    firstCycleRef.current = true;
    setRunning(true);
    setStats({ scanned: 0, deals: 0, sent: 0 });
    addLog("🚀 Uruchamiam skanowanie — zbieram istniejące ogłoszenia (cykl #1), od cyklu #2 analizuję tylko nowe", "success");

    let n = 1;
    while (runningRef.current) {
      setCycleNum(n);
      await runOneCycle(n);
      if (!runningRef.current) break;
      for (let i = 60; i > 0 && runningRef.current; i--) {
        await sleep(1000);
      }
      n++;
    }

    setRunning(false);
    addLog("⏹ Zatrzymano", "info");

                    </div>

                    </div>

            <div style={{ background: "#070f1e", border: "1px solid #0f1f36", borderRadius: 14, padding: 16, fontSize: 12, color: "#334155", lineHeight: 1.7 }}>

            ) : results.map(r => (
              <div key={r.id} style={{
                background: "#0d1526",

        {/* ═══ CHAT ═══ */}
        {tab === "chat" && (

              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <button onClick={() => setShowKnowledgePanel(p => !p)} style={{
                  padding: "6px 14px", borderRadius: 8, border: `1px solid ${showKnowledgePanel ? "#f59e0b88" : "#1e293b"}`,
                  background: showKnowledgePanel ? "#f59e0b18" : "#0f172a",
                  color: showKnowledgePanel ? "#f59e0b" : "#475569", fontSize: 12, fontWeight: 600,

                {chatMessages.length > 0 && (

              borderRadius: "14px 14px 0 0", padding: 16, display: "flex", flexDirection: "column", gap: 12,
            }}>
              {chatMessages.length === 0 && (
                <div style={{ margin: "auto", textAlign: "center", color: "#1e3352" }}>
                  <div style={{ fontSize: 48, marginBottom: 12 }}>💬</div>
                  <div style={{ fontSize: 14 }}>Zacznij rozmowę z {PROVIDERS[provider]?.label || "AI"}…</div>
                  <div style={{ fontSize: 12, marginTop: 6, color: "#1a2d4a" }}>
                    Historia jest zapisywana automatycznie i dostępna po ponownym uruchomieniu
                  </div>
                </div>
              )}
              {chatMessages.map((msg, i) => (
                <div key={i} style={{
                  display: "flex", flexDirection: "column",
                  alignItems: msg.role === "user" ? "flex-end" : "flex-start",
                }}>
                  <div style={{ fontSize: 10, color: "#1e3352", marginBottom: 4, paddingLeft: 4, paddingRight: 4 }}>
                    {msg.role === "user" ? "Ty" : PROVIDERS[provider]?.label || "AI"} · {msg.time}
                  </div>
                  <div style={{
                    maxWidth: "80%", padding: "10px 14px", borderRadius: msg.role === "user" ? "14px 14px 4px 14px" : "14px 14px 14px 4px",
                    background: msg.role === "user" ? "#1a3a5f" : (msg.isError ? "#2d1010" : "#0d1526"),
                    border: `1px solid ${msg.role === "user" ? "#2d5a8f" : (msg.isError ? "#ef444433" : "#1a2d4a")}`,
                    color: msg.isError ? "#f87171" : "#e2e8f0",
                    fontSize: 13, lineHeight: 1.6, whiteSpace: "pre-wrap", wordBreak: "break-word",
                  }}>
                    {msg.content}
                  </div>
                  {!msg.isError && (
                    <button onClick={() => addKnowledgeFromMessage(msg.content)} style={{
                      marginTop: 4, padding: "3px 10px", borderRadius: 6,
                      border: "1px solid #f59e0b33", background: "#f59e0b11",
                      color: "#f59e0b", fontSize: 10, fontWeight: 600,
                    }}>📌 Zapisz jako wiedzę o cenach</button>
                  )}
                </div>
              ))}
              {chatLoading && (
                <div style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
                  <div style={{
                    padding: "10px 14px", borderRadius: "14px 14px 14px 4px",
                    background: "#0d1526", border: "1px solid #1a2d4a",
                    color: "#475569", fontSize: 13,
                  }}>
                    <span style={{ animation: "pulse 1s infinite", display: "inline-block" }}>●</span>
                    <span style={{ marginLeft: 4, animation: "pulse 1s infinite 0.2s", display: "inline-block" }}>●</span>
                    <span style={{ marginLeft: 4, animation: "pulse 1s infinite 0.4s", display: "inline-block" }}>●</span>
                  </div>
                </div>
              )}
              <div ref={chatEndRef} />
            </div>

            {/* Input area */}
            <div style={{
              background: "#0d1526", border: "1px solid #1a2d4a", borderTop: "none",
              borderRadius: "0 0 14px 14px", padding: 12,
              display: "flex", gap: 10, alignItems: "flex-end",
            }}>
              <textarea
                rows={2}
                value={chatInput}
                onChange={e => setChatInput(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChatMessage(); } }}
                placeholder="Napisz wiadomość… (Enter = wyślij, Shift+Enter = nowa linia)"
                style={{ flex: 1, resize: "none", lineHeight: 1.5 }}
              />
              <button onClick={sendChatMessage} disabled={chatLoading || !chatInput.trim()} style={{
                padding: "10px 20px", borderRadius: 10, border: "none",
                background: chatLoading || !chatInput.trim() ? "#1e293b" : "linear-gradient(135deg, #f59e0b, #ef4444)",
                color: chatLoading || !chatInput.trim() ? "#334155" : "#080d18",
                fontWeight: 800, fontSize: 14, whiteSpace: "nowrap",
                cursor: chatLoading || !chatInput.trim() ? "not-allowed" : "pointer",
              }}>
                {chatLoading ? "⏳" : "▶ Wyślij"}
              </button>
            </div>
          </div>
        )}

        {/* ═══ SETTINGS ═══ */}
        {tab === "settings" && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>

            {/* AI Provider */}
            <div style={{ background: "#0d1526", border: "1px solid #1a2d4a", borderRadius: 16, padding: 24 }}>
              <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 20, display: "flex", alignItems: "center", gap: 10 }}>
                <span>🤖</span> AI Provider
              </div>

              {/* Provider toggle */}
              <div style={{ marginBottom: 16 }}>
                <label style={{ fontSize: 11, color: "#475569", display: "block", marginBottom: 8, textTransform: "uppercase", letterSpacing: 0.8 }}>
                  Dostawca AI
                </label>
                <div style={{ display: "flex", gap: 8 }}>
                  {Object.entries(PROVIDERS).map(([id, p]) => (
                    <button key={id} onClick={() => {
                      setProvider(id);
                      setGeminiModel(p.models[0].id);
                    }} style={{
                      flex: 1, padding: "10px 8px", borderRadius: 8, fontWeight: 600, fontSize: 12,
                      border: `1px solid ${provider === id ? "#f59e0b88" : "#1e293b"}`,
                      background: provider === id ? "#f59e0b18" : "#0f172a",
                      color: provider === id ? "#f59e0b" : "#475569",
                    }}>{p.label}</button>
                  ))}
                </div>
                {provider === "groq" && (
                  <div style={{ marginTop: 8, background: "#0a1f0f", border: "1px solid #22c55e33", borderRadius: 8, padding: "8px 12px", fontSize: 11, color: "#22c55e" }}>
                    ✅ Darmowy, bez karty — 14 400 req/dzień. Zarejestruj się na console.groq.com
                  </div>
                )}
              </div>

              <div style={{ marginBottom: 14 }}>
                <label style={{ fontSize: 11, color: "#475569", display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: 0.8 }}>
                  Klucz API *
                </label>
                <input type="password" placeholder={PROVIDERS[provider].keyPlaceholder}
                  value={geminiKey} onChange={e => setGeminiKey(e.target.value)} />
                <div style={{ fontSize: 11, color: "#334155", marginTop: 5 }}>{PROVIDERS[provider].keyHint}</div>
              </div>

              <div style={{ marginBottom: 14 }}>
                <label style={{ fontSize: 11, color: "#475569", display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: 0.8 }}>
                  Model
                </label>
                <select value={geminiModel} onChange={e => setGeminiModel(e.target.value)}>
                  {PROVIDERS[provider].models.map(m => <option key={m.id} value={m.id}>{m.label}</option>)}
                </select>
              </div>

              <div style={{ marginBottom: 14 }}>
                <label style={{ fontSize: 11, color: "#f59e0b", display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: 0.8 }}>
                  ★ Kontekst (opcjonalne)
                </label>
                <input type="text" placeholder="np. Bike Deals Analyzer"
                  value={geminiChatName} onChange={e => setGeminiChatName(e.target.value)} />
                <div style={{ fontSize: 11, color: "#334155", marginTop: 5 }}>
                  Dodatkowy kontekst dodawany do każdego promptu
                </div>
              </div>
            </div>

            {/* Discord */}
            <div style={{ background: "#0d1526", border: "1px solid #1a2d4a", borderRadius: 16, padding: 24 }}>
              <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 20, display: "flex", alignItems: "center", gap: 10 }}>
                <span>💬</span> Discord
              </div>

              <div style={{ marginBottom: 14 }}>
                <label style={{ fontSize: 11, color: "#475569", display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: 0.8 }}>
                  Webhook URL *
                </label>
                <input type="password" placeholder="https://discord.com/api/webhooks/..."
                  value={discordWebhook} onChange={e => setDiscordWebhook(e.target.value)} />
                <div style={{ fontSize: 11, color: "#334155", marginTop: 5 }}>
                  Kanał → Edytuj → Integracje → Webhooki
                </div>
              </div>

              <div style={{ marginBottom: 20 }}>
                <label style={{ fontSize: 11, color: "#475569", display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: 0.8 }}>
                  Thread ID (opcjonalne)
                </label>
                <input type="text" placeholder="ID wątku"
                  value={discordThread} onChange={e => setDiscordThread(e.target.value)} />
              </div>

              <button onClick={async () => {
                if (!discordWebhook) { addLog("❌ Brak webhook URL", "error"); return; }
                try {
                  const r = await callDiscord({ content: "✅ **DirtDealFinder** połączony! Okazje będą tu trafiać 🚲" });
                  if (r.ok) addLog("✅ Test Discord – OK!", "success");
                  else addLog(`❌ Webhook błąd ${r.status}`, "error");
                } catch (e) { addLog(`❌ ${e.message}`, "error"); }
              }} style={{
                width: "100%", padding: "10px 0", borderRadius: 10,
                border: "1px solid #5865f255", background: "#5865f218",
                color: "#7c8cf8", fontWeight: 700, fontSize: 13,
              }}>📡 Test webhook</button>

              <div style={{ marginTop: 20, paddingTop: 20, borderTop: "1px solid #1a2d4a" }}>
                <label style={{ fontSize: 11, color: "#f59e0b", display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: 0.8 }}>
                  ❓ Webhook "Niepewne" (opcjonalne, osobny kanał)
                </label>
                <input type="password" placeholder="https://discord.com/api/webhooks/..."
                  value={uncertainWebhook} onChange={e => setUncertainWebhook(e.target.value)} />
                <div style={{ fontSize: 11, color: "#334155", marginTop: 5, lineHeight: 1.5 }}>
                  Rowery, które wyglądają na full/dirt ale Gemini ma za mało danych żeby ocenić opłacalność (np. brak ceny, zdawkowy opis) — wysyłane jako zbiorcza lista linków na koniec każdego cyklu, na osobny kanał.
                </div>
              </div>
            </div>

            {/* Filtr słów kluczowych */}
            <div style={{ gridColumn: "span 2", background: "#0d1526", border: "1px solid #1a2d4a", borderRadius: 16, padding: 24 }}>
              <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 20, display: "flex", alignItems: "center", gap: 10 }}>
                <span>🚫</span> Filtr słów kluczowych (przed Gemini, za darmo)
              </div>
              <div style={{ marginBottom: 10 }}>
                <label style={{ fontSize: 11, color: "#475569", display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: 0.8 }}>
                  Słowa do odrzucenia (przecinek lub nowa linia)
                </label>
                <textarea
                  rows={4}
                  value={filterKeywords}
                  onChange={e => setFilterKeywords(e.target.value)}
                  style={{ fontFamily: "monospace", fontSize: 12, lineHeight: 1.7, resize: "vertical" }}
                />
                <div style={{ fontSize: 11, color: "#334155", marginTop: 5, lineHeight: 1.5 }}>
                  Jeśli tytuł LUB opis ogłoszenia zawiera dowolne z tych słów (bez rozróżniania wielkości liter) — ogłoszenie jest odrzucane od razu, bez wysyłania do Gemini. Oszczędza koszty i czas na oczywistych nietrafieniach (szosówki, dziecięce, e-bike, części itd).
                </div>
              </div>
              <button onClick={() => setFilterKeywords(DEFAULT_FILTER_KEYWORDS)} style={{
                padding: "6px 14px", borderRadius: 8, border: "1px solid #1e293b",
                background: "transparent", color: "#475569", fontSize: 11,
              }}>↩ Przywróć domyślne</button>
            </div>

            {/* Etap 1 — Groq jako klasyfikator typu (zamiast białej listy słów) */}
            <div style={{ gridColumn: "span 2", background: "#0d1526", border: "1px solid #1a2d4a", borderRadius: 16, padding: 24 }}>
              <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 20, display: "flex", alignItems: "center", gap: 10 }}>
                <span>🤖</span> Etap 1 — Groq jako szybki klasyfikator (przed Gemini)
              </div>
              <div style={{ marginBottom: 14 }}>
                <label style={{ fontSize: 11, color: "#475569", display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: 0.8 }}>
                  Klucz API Groq (osobny od providera w czacie powyżej)
                </label>
                <input type="password" placeholder="gsk_..."
                  value={groqClassifierKey} onChange={e => setGroqClassifierKey(e.target.value)} />
                <div style={{ fontSize: 11, color: "#334155", marginTop: 5, lineHeight: 1.5 }}>
                  console.groq.com/keys — model llama-3.1-8b-instant, 14 400 zapytań/dzień za darmo. Każde świeże ogłoszenie (po przejściu filtra słów) dostaje krótkie pytanie: full / dirt / elektryk górski / inny / niepewne. Tylko "inny" jest od razu odrzucane — nie idzie do Gemini. "Niepewne" (lub błąd Groqa) przechodzi dalej, ale z niższym priorytetem w Etapie 2. Puste pole = ten etap jest wyłączony, wszystko leci od razu do Gemini.
                </div>
              </div>

              <div style={{ marginTop: 18, paddingTop: 18, borderTop: "1px solid #1a2d4a" }}>
                <label style={{ fontSize: 11, color: "#475569", display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: 0.8 }}>
                  Maks. rowerów wysyłanych do Gemini na jeden cykl
                </label>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <input
                    type="range" min="1" max="100" step="1"
                    value={maxGeminiPerCycle}
                    onChange={e => setMaxGeminiPerCycle(Number(e.target.value))}
                    style={{ flex: 1, accentColor: "#f59e0b", padding: 0, border: "none", background: "transparent" }}
                  />
                  <div style={{ minWidth: 40, textAlign: "center", fontWeight: 800, fontSize: 22, color: "#f59e0b" }}>{maxGeminiPerCycle}</div>
                </div>
                <div style={{ fontSize: 11, color: "#334155", marginTop: 5, lineHeight: 1.5 }}>
                  Jeśli po Etapie 1 zostanie więcej kandydatów niż ten limit — pierwsze idą rowery o PEWNEJ klasyfikacji (full/dirt/elektryk górski), reszta ("niepewne") jest pomijana w tym cyklu. Chroni Gemini przed przeciążeniem, gdy nagle pojawi się dużo nowych ogłoszeń.
                </div>
              </div>

              <div style={{ marginTop: 18, paddingTop: 18, borderTop: "1px solid #1a2d4a" }}>
                <label style={{ fontSize: 11, color: "#475569", display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: 0.8 }}>
                  Min. cena dla ogłoszeń o niepewnym typie (€)
                </label>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <input
                    type="range" min="0" max="2000" step="50"
                    value={minUncertainPrice}
                    onChange={e => setMinUncertainPrice(Number(e.target.value))}
                    style={{ flex: 1, accentColor: "#f59e0b", padding: 0, border: "none", background: "transparent" }}
                  />
                  <div style={{ minWidth: 55, textAlign: "center", fontWeight: 800, fontSize: 22, color: "#f59e0b" }}>{minUncertainPrice}€</div>
                </div>
                <div style={{ fontSize: 11, color: "#334155", marginTop: 5, lineHeight: 1.5 }}>
                  Gdy Groq nie umie rozpoznać typu ("niepewne") ale ogłoszenie MA podaną cenę — idzie do Gemini tylko jeśli ta cena wynosi co najmniej tyle. Poniżej progu ogłoszenie jest odrzucane bez Gemini (zbyt tanie żeby ryzykować, skoro i tak nie wiadomo co to za rower). Ogłoszenia BEZ ceny zawsze trafiają do listy niepewnych na Discord, niezależnie od tego ustawienia — nie mają z czym porównać progu.
                </div>
              </div>
            </div>

            {/* Strategia */}
            <div style={{ gridColumn: "span 2", background: "#0d1526", border: "1px solid #1a2d4a", borderRadius: 16, padding: 24 }}>
              <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 20, display: "flex", alignItems: "center", gap: 10 }}>
                <span>🎯</span> Strategia oceny
              </div>

              <div>
                <label style={{ fontSize: 11, color: "#475569", display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: 0.8 }}>
                  Minimalny zysk (%)
                </label>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <input
                    type="range" min="5" max="100" step="5"
                    value={minProfit}
                    onChange={e => setMinProfit(Number(e.target.value))}
                    style={{ flex: 1, accentColor: "#f59e0b", padding: 0, border: "none", background: "transparent" }}
                  />
                  <div style={{
                    minWidth: 64, textAlign: "center", fontWeight: 800, fontSize: 22, color: "#f59e0b",
                  }}>{minProfit}%</div>
                </div>
                <div style={{ fontSize: 11, color: "#334155", marginTop: 4 }}>
                  Gemini powie TAK tylko gdy szacowany zysk wynosi minimum {minProfit}% ceny zakupu
                </div>
              </div>
            </div>

            {/* Save */}
            <div style={{ gridColumn: "span 2" }}>
              <button onClick={saveSettings} style={{
                width: "100%", padding: "14px 0", borderRadius: 12, border: "none",
                fontWeight: 800, fontSize: 15,
                background: "linear-gradient(135deg, #f59e0b, #ef4444)",
                color: "#080d18",
              }}>💾 Zapisz ustawienia</button>
            </div>

            {/* How it works */}
            <div style={{ gridColumn: "span 2", background: "#0d1526", border: "1px solid #1a3a5f", borderRadius: 16, padding: 24 }}>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 14, color: "#3b82f6" }}>ℹ️ Jak to działa?</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14 }}>
                {[
                  { ico: "🔄", t: "Pętla ciągła",  d: "Skanuje bez przerwy — po każdym pełnym cyklu czeka 60s i zaczyna od nowa" },
                  { ico: "🆕", t: "Tylko nowe",     d: "Każde ogłoszenie trafia do Gemini tylko raz — widziane ID są zapamiętane" },
                  { ico: "🤖", t: "AI (Groq/Gemini)", d: "Rozpoznaje typ (full/dirt/inny) i ocenia czy warto kupić i odsprzedać w Polsce. Typ \"inny\" jest zawsze odrzucany" },
                  { ico: "📨", t: "Discord",        d: "Webhook z ceną, zyskiem i linkiem wysyłany TYLKO gdy Gemini mówi TAK" },
                ].map(s => (
                  <div key={s.t} style={{ background: "#070c17", borderRadius: 12, padding: 16 }}>
                    <div style={{ fontSize: 22, marginBottom: 8 }}>{s.ico}</div>
                    <div style={{ fontWeight: 700, marginBottom: 6, fontSize: 13 }}>{s.t}</div>
                    <div style={{ fontSize: 12, color: "#475569", lineHeight: 1.6 }}>{s.d}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
